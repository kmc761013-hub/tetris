<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>테트리스</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #eee;
  }
  #game-container {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  canvas {
    border: 2px solid #e94560;
    box-shadow: 0 0 20px #e94560;
  }
  #sidebar {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 120px;
  }
  .panel {
    background: #16213e;
    border: 1px solid #0f3460;
    border-radius: 8px;
    padding: 12px;
  }
  .panel h3 {
    color: #e94560;
    font-size: 12px;
    margin-bottom: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .panel p {
    font-size: 22px;
    font-weight: bold;
    color: #fff;
  }
  #next-canvas {
    display: block;
    margin: 0 auto;
  }
  #controls {
    font-size: 11px;
    line-height: 1.8;
    color: #aaa;
  }
  #controls span { color: #e94560; }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 16px;
    z-index: 10;
  }
  #overlay h2 { font-size: 36px; color: #e94560; }
  #overlay p { color: #aaa; font-size: 14px; }
  #start-btn {
    background: #e94560;
    color: #fff;
    border: none;
    padding: 12px 32px;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
  }
  #start-btn:hover { background: #c73652; }
</style>
</head>
<body>

<div id="game-container">
  <canvas id="board" width="300" height="600"></canvas>
  <div id="sidebar">
    <div class="panel">
      <h3>점수</h3>
      <p id="score">0</p>
    </div>
    <div class="panel">
      <h3>레벨</h3>
      <p id="level">1</p>
    </div>
    <div class="panel">
      <h3>줄</h3>
      <p id="lines">0</p>
    </div>
    <div class="panel">
      <h3>다음</h3>
      <canvas id="next-canvas" width="100" height="100"></canvas>
    </div>
    <div class="panel" id="controls">
      <span>←→</span> 이동<br>
      <span>↑ / Z</span> 회전<br>
      <span>↓</span> 소프트드롭<br>
      <span>Space</span> 하드드롭<br>
      <span>P</span> 일시정지
    </div>
  </div>
</div>

<div id="overlay">
  <h2>테트리스</h2>
  <p>방향키로 조작하세요</p>
  <button id="start-btn">시작</button>
</div>

<script>
const COLS = 10, ROWS = 20, BLOCK = 30;
const COLORS = ['', '#FF4444','#FF8C00','#FFD700','#00CC44','#00BFFF','#7B68EE','#FF69B4'];

const SHAPES = [
  [],
  [[1,1,1,1]],                          // I
  [[2,0,0],[2,2,2]],                    // J
  [[0,0,3],[3,3,3]],                    // L
  [[4,4],[4,4]],                        // O
  [[0,5,5],[5,5,0]],                    // S
  [[6,6,6],[0,6,0]],                    // T
  [[7,0],[7,7],[0,7]],                  // Z
];

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nCtx = nextCanvas.getContext('2d');

let board, piece, nextPiece, score, level, lines, gameOver, paused, dropTimer, dropInterval, animId;

function createBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function randomPiece() {
  const id = Math.floor(Math.random() * 7) + 1;
  const shape = SHAPES[id].map(r => [...r]);
  return {
    id, shape,
    x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2),
    y: 0
  };
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  const result = Array.from({length: cols}, () => Array(rows).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      result[c][rows - 1 - r] = shape[r][c];
  return result;
}

function valid(shape, ox, oy) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) {
        const nx = ox + c, ny = oy + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && board[ny][nx]) return false;
      }
  return true;
}

function place() {
  for (let r = 0; r < piece.shape.length; r++)
    for (let c = 0; c < piece.shape[r].length; c++)
      if (piece.shape[r][c]) {
        const ny = piece.y + r;
        if (ny < 0) { endGame(); return; }
        board[ny][piece.x + c] = piece.shape[r][c];
      }
  clearLines();
  piece = nextPiece;
  nextPiece = randomPiece();
  if (!valid(piece.shape, piece.x, piece.y)) endGame();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c !== 0)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(0));
      cleared++;
      r++;
    }
  }
  if (cleared) {
    const pts = [0, 100, 300, 500, 800];
    score += (pts[cleared] || 800) * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(100, 1000 - (level - 1) * 90);
    updateUI();
  }
}

function hardDrop() {
  while (valid(piece.shape, piece.x, piece.y + 1)) piece.y++;
  place();
}

function ghostY() {
  let gy = piece.y;
  while (valid(piece.shape, piece.x, gy + 1)) gy++;
  return gy;
}

function drawBlock(ctx, x, y, color, alpha = 1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x * BLOCK + 1, y * BLOCK + 1, BLOCK - 2, BLOCK - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(x * BLOCK + 1, y * BLOCK + 1, BLOCK - 2, 4);
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * BLOCK); ctx.lineTo(canvas.width, r * BLOCK); ctx.stroke();
  }
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * BLOCK, 0); ctx.lineTo(c * BLOCK, canvas.height); ctx.stroke();
  }

  // board
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) drawBlock(ctx, c, r, COLORS[board[r][c]]);

  // ghost
  if (!gameOver && !paused) {
    const gy = ghostY();
    for (let r = 0; r < piece.shape.length; r++)
      for (let c = 0; c < piece.shape[r].length; c++)
        if (piece.shape[r][c])
          drawBlock(ctx, piece.x + c, gy + r, COLORS[piece.id], 0.2);
  }

  // active piece
  if (!gameOver) {
    for (let r = 0; r < piece.shape.length; r++)
      for (let c = 0; c < piece.shape[r].length; c++)
        if (piece.shape[r][c])
          drawBlock(ctx, piece.x + c, piece.y + r, COLORS[piece.id]);
  }

  // next piece
  nCtx.fillStyle = '#0a0a1a';
  nCtx.fillRect(0, 0, 100, 100);
  const ns = nextPiece.shape;
  const ox = Math.floor((4 - ns[0].length) / 2);
  const oy = Math.floor((4 - ns.length) / 2);
  const nb = 22;
  for (let r = 0; r < ns.length; r++)
    for (let c = 0; c < ns[r].length; c++)
      if (ns[r][c]) {
        nCtx.fillStyle = COLORS[nextPiece.id];
        nCtx.fillRect((ox + c) * nb + 4, (oy + r) * nb + 4, nb - 2, nb - 2);
      }
}

function updateUI() {
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;
}

let lastTime = 0;
function loop(ts) {
  if (!paused && !gameOver) {
    if (ts - lastTime > dropInterval) {
      if (valid(piece.shape, piece.x, piece.y + 1)) piece.y++;
      else place();
      lastTime = ts;
    }
    draw();
  }
  animId = requestAnimationFrame(loop);
}

function startGame() {
  board = createBoard();
  score = 0; level = 1; lines = 0;
  dropInterval = 1000;
  gameOver = false; paused = false;
  piece = randomPiece();
  nextPiece = randomPiece();
  updateUI();
  document.getElementById('overlay').style.display = 'none';
  lastTime = 0;
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function endGame() {
  gameOver = true;
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <h2>게임 오버</h2>
    <p>점수: ${score.toLocaleString()} | 레벨: ${level} | 줄: ${lines}</p>
    <button id="start-btn" onclick="startGame()">다시 시작</button>
  `;
  overlay.style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (gameOver) return;
  if (e.key === 'p' || e.key === 'P') {
    paused = !paused;
    if (!paused) { lastTime = performance.now(); }
    return;
  }
  if (paused) return;
  switch (e.key) {
    case 'ArrowLeft':
      if (valid(piece.shape, piece.x - 1, piece.y)) piece.x--;
      break;
    case 'ArrowRight':
      if (valid(piece.shape, piece.x + 1, piece.y)) piece.x++;
      break;
    case 'ArrowDown':
      if (valid(piece.shape, piece.x, piece.y + 1)) piece.y++;
      else place();
      lastTime = performance.now();
      break;
    case 'ArrowUp':
    case 'z': case 'Z': {
      const rot = rotate(piece.shape);
      if (valid(rot, piece.x, piece.y)) piece.shape = rot;
      else if (valid(rot, piece.x - 1, piece.y)) { piece.shape = rot; piece.x--; }
      else if (valid(rot, piece.x + 1, piece.y)) { piece.shape = rot; piece.x++; }
      break;
    }
    case ' ':
      e.preventDefault();
      hardDrop();
      break;
  }
  draw();
});

document.getElementById('start-btn').addEventListener('click', startGame);
</script>
</body>
</html>
